name = "utopia-animal-web"
compatibility_date = "2026-05-01"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "elim-solicitudes"
database_id = "00323901-9632-41bd-b5b5-a388c432e1c5"

# Workers AI: evaluación automática de solicitudes de adopción al recibirlas.
[ai]
binding = "AI"

# Meta CAPI (Conversion API) - Configuración vía Environment Variables en Cloudflare Dashboard
# Agregar en Pages → Settings → Environment Variables:
# META_PIXEL_ID = "28070208119234980"
# META_ACCESS_TOKEN = "<system_user_token_con_ads_management>"
